name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UMAMI_SCRIPT_URL: ${{ vars.UMAMI_SCRIPT_URL }}
      UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
      UMAMI_DOMAINS: ${{ vars.UMAMI_DOMAINS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build tech tree graph (fails on broken prerequisites)
        run: uv run python scripts/build_graph.py

      - name: Configure analytics
        run: uv run python scripts/write_analytics_config.py

      - name: Build site
        run: uv run mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
